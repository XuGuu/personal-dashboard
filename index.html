<!DOCTYPE html>
<!--
  个人仪表盘 (Personal Dashboard)
  一个纯前端的"新标签页"主页：时钟、问候语、天气、待办清单、快捷链接、每日一言。
  所有数据都存在浏览器本地（localStorage），不需要服务器，也不会上传到任何地方。
  直接用浏览器打开本文件即可使用。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的仪表盘</title>
  <style>
    /* ---------- 基础与主题 ---------- */
    :root {
      --accent: #6c8cff;
      --card: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.22);
      --text: #f5f7ff;
      --muted: rgba(245, 247, 255, 0.7);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, #1e2a78 0%, #6a3093 50%, #a044ff 100%);
      background-attachment: fixed;
      padding: 32px 20px 60px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }

    /* ---------- 顶部：时钟 + 问候 + 天气 ---------- */
    .hero { text-align: center; margin: 24px 0 36px; }
    .clock { font-size: 72px; font-weight: 200; letter-spacing: 2px; }
    .clock .sec { font-size: 32px; opacity: 0.6; }
    .date { font-size: 16px; color: var(--muted); margin-top: 4px; }
    .greeting { font-size: 26px; margin-top: 14px; font-weight: 300; }
    .weather { font-size: 15px; color: var(--muted); margin-top: 8px; min-height: 20px; }

    /* ---------- 卡片网格 ---------- */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    /* ---------- 输入框与按钮 ---------- */
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input[type="text"], input[type="url"] {
      flex: 1; padding: 10px 12px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.18); color: var(--text); font-size: 14px; outline: none;
    }
    input::placeholder { color: rgba(245,247,255,0.5); }
    button {
      border: none; border-radius: 10px; padding: 10px 14px; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
      transition: filter .15s;
    }
    button:hover { filter: brightness(1.1); }

    /* ---------- 待办清单 ---------- */
    ul { list-style: none; }
    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 4px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.done span { text-decoration: line-through; opacity: 0.5; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
    .todo-item span { flex: 1; font-size: 14px; word-break: break-word; }
    .del { background: transparent; color: var(--muted); padding: 2px 8px; font-size: 18px; line-height: 1; }
    .del:hover { color: #ff8a8a; }
    .empty { color: var(--muted); font-size: 14px; padding: 8px 0; }
    .todo-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: var(--muted); }
    .todo-foot button { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 12px; font-weight: 400; }
    .todo-foot button:hover { color: #ff8a8a; }

    /* ---------- 快捷链接 ---------- */
    .links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .link-tile {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 6px; border-radius: 12px; text-decoration: none; color: var(--text);
      background: rgba(255,255,255,0.1); font-size: 12px; position: relative; text-align: center;
    }
    .link-tile:hover { background: rgba(255,255,255,0.2); }
    .link-tile .icon { font-size: 22px; }
    .link-tile .x {
      position: absolute; top: 2px; right: 6px; color: var(--muted); font-size: 14px;
      opacity: 0; transition: opacity .15s;
    }
    .link-tile:hover .x { opacity: 1; }

    /* ---------- 每日一言 ---------- */
    .quote { grid-column: 1 / -1; text-align: center; font-style: italic; font-size: 17px; line-height: 1.6; }
    .quote .author { display: block; margin-top: 8px; font-size: 14px; color: var(--muted); font-style: normal; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 顶部 -->
    <div class="hero">
      <div class="clock" id="clock">--:--<span class="sec">00</span></div>
      <div class="date" id="date"></div>
      <div class="greeting" id="greeting"></div>
      <div class="weather" id="weather">正在获取天气…（首次需允许浏览器获取位置）</div>
    </div>

    <div class="grid">
      <!-- 待办 -->
      <div class="card">
        <h2>📝 今日待办</h2>
        <div class="row">
          <input type="text" id="todoInput" placeholder="要做什么？回车添加">
          <button onclick="addTodo()">添加</button>
        </div>
        <ul id="todoList"></ul>
        <div class="todo-foot" id="todoFoot" style="display:none;">
          <span id="todoStat"></span>
          <button onclick="clearCompleted()">清空已完成</button>
        </div>
      </div>

      <!-- 快捷链接 -->
      <div class="card">
        <h2>🔗 快捷链接</h2>
        <div class="row">
          <input type="text" id="linkName" placeholder="名字（如 哔哩哔哩）">
          <input type="url" id="linkUrl" placeholder="网址 https://...">
          <button onclick="addLink()">加</button>
        </div>
        <div class="links" id="linkList"></div>
      </div>

      <!-- 每日一言 -->
      <div class="card quote" id="quoteCard">
        <span id="quoteText">…</span>
        <span class="author" id="quoteAuthor"></span>
      </div>
    </div>
  </div>

  <script>
    /* ====================================================================
       说明：下面所有数据都用 localStorage 保存在你自己的浏览器里。
       localStorage 是浏览器自带的小仓库，关掉网页数据也还在，刷新不会丢。
       ==================================================================== */

    // ---------- 时钟 + 日期 + 问候 ----------
    function tick() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').innerHTML = `${h}:${m}<span class="sec">${s}</span>`;

      const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      document.getElementById('date').textContent =
        `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

      const hour = now.getHours();
      let greet = '你好';
      if (hour < 6) greet = '夜深了，注意休息 🌙';
      else if (hour < 9) greet = '早上好，新的一天开始啦 ☀️';
      else if (hour < 12) greet = '上午好，加油 💪';
      else if (hour < 14) greet = '中午好，记得吃饭 🍚';
      else if (hour < 18) greet = '下午好，喝杯水吧 ☕';
      else if (hour < 22) greet = '晚上好，放松一下 🌆';
      else greet = '夜深了，注意休息 🌙';
      document.getElementById('greeting').textContent = greet;
    }
    tick();
    setInterval(tick, 1000);

    // ---------- 天气（用免费的 Open-Meteo，无需密钥）----------
    function loadWeather() {
      if (!navigator.geolocation) {
        document.getElementById('weather').textContent = '当前浏览器不支持定位，跳过天气。';
        return;
      }
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code`;
          const res = await fetch(url);
          const data = await res.json();
          const t = Math.round(data.current.temperature_2m);
          const desc = weatherText(data.current.weather_code);
          document.getElementById('weather').textContent = `当前 ${t}°C · ${desc}`;
        } catch (e) {
          document.getElementById('weather').textContent = '天气获取失败，检查下网络～';
        }
      }, () => {
        document.getElementById('weather').textContent = '未授权定位，天气已跳过（点地址栏可重新允许）。';
      });
    }
    // 把天气代码翻译成中文（Open-Meteo 的 WMO 标准代码）
    function weatherText(code) {
      const map = {
        0:'晴', 1:'晴间多云', 2:'多云', 3:'阴',
        45:'有雾', 48:'雾凇', 51:'小毛毛雨', 53:'毛毛雨', 55:'大毛毛雨',
        61:'小雨', 63:'中雨', 65:'大雨', 71:'小雪', 73:'中雪', 75:'大雪',
        80:'阵雨', 81:'强阵雨', 82:'暴雨', 95:'雷阵雨', 96:'雷阵雨伴冰雹'
      };
      return map[code] || '天气未知';
    }
    loadWeather();

    // ---------- 待办清单 ----------
    let todos = JSON.parse(localStorage.getItem('dash_todos') || '[]');
    function saveTodos() { localStorage.setItem('dash_todos', JSON.stringify(todos)); }
    function renderTodos() {
      const list = document.getElementById('todoList');
      const foot = document.getElementById('todoFoot');
      if (todos.length === 0) { list.innerHTML = '<li class="empty">还没有待办，添加一个吧～</li>'; foot.style.display = 'none'; return; }
      list.innerHTML = todos.map((t, i) => `
        <li class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTodo(${i})">
          <span>${escapeHtml(t.text)}</span>
          <button class="del" onclick="removeTodo(${i})">×</button>
        </li>`).join('');
      const doneCount = todos.filter(t => t.done).length;
      const left = todos.length - doneCount;
      document.getElementById('todoStat').textContent = `还有 ${left} 项 · 已完成 ${doneCount} 项`;
      foot.style.display = doneCount > 0 ? 'flex' : 'none';
    }
    function clearCompleted() {
      todos = todos.filter(t => !t.done);
      saveTodos(); renderTodos();
    }
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      saveTodos(); renderTodos();
    }
    function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
    function removeTodo(i) { todos.splice(i, 1); saveTodos(); renderTodos(); }
    document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    renderTodos();

    // ---------- 快捷链接 ----------
    let links = JSON.parse(localStorage.getItem('dash_links') || 'null')
      || [ { name: '哔哩哔哩', url: 'https://www.bilibili.com' },
            { name: 'GitHub', url: 'https://github.com' },
            { name: '微博', url: 'https://weibo.com' } ];
    function saveLinks() { localStorage.setItem('dash_links', JSON.stringify(links)); }
    function renderLinks() {
      const box = document.getElementById('linkList');
      box.innerHTML = links.map((l, i) => `
        <a class="link-tile" href="${escapeAttr(l.url)}" target="_blank" rel="noopener">
          <span class="x" onclick="removeLink(event, ${i})">×</span>
          <span class="icon">${faviconOrEmoji(l)}</span>
          <span>${escapeHtml(l.name)}</span>
        </a>`).join('');
    }
    function faviconOrEmoji(l) {
      // 用网站第一个字母当图标，简单又不依赖外部图片
      return (l.name || '?').trim().charAt(0).toUpperCase();
    }
    function addLink() {
      const name = document.getElementById('linkName').value.trim();
      let url = document.getElementById('linkUrl').value.trim();
      if (!name || !url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url; // 自动补上 https://
      links.push({ name, url });
      document.getElementById('linkName').value = '';
      document.getElementById('linkUrl').value = '';
      saveLinks(); renderLinks();
    }
    function removeLink(e, i) {
      e.preventDefault(); e.stopPropagation(); // 阻止点叉号时跳转
      links.splice(i, 1); saveLinks(); renderLinks();
    }
    renderLinks();

    // ---------- 每日一言（本地内置，离线也能用）----------
    const quotes = [
      { t: '种一棵树最好的时间是十年前，其次是现在。', a: '谚语' },
      { t: '不积跬步，无以至千里。', a: '荀子' },
      { t: '你只管努力，剩下的交给时间。', a: '佚名' },
      { t: '完成比完美更重要。', a: '雪莉·桑德伯格' },
      { t: '今天能做的事，不要拖到明天。', a: '富兰克林' },
      { t: '慢慢来，比较快。', a: '佚名' },
      { t: '所有的努力都不会白费，它们只是在等一个时机。', a: '佚名' },
    ];
    // 按"今天是一年中的第几天"选一句，保证一整天不变、每天换一句
    const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    const q = quotes[dayOfYear % quotes.length];
    document.getElementById('quoteText').textContent = '“' + q.t + '”';
    document.getElementById('quoteAuthor').textContent = '— ' + q.a;

    // ---------- 安全：把用户输入里的特殊字符转义，避免破坏页面 ----------
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
  </script>
</body>
</html>
